<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste API Livealoe</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      color: #2d5f3d;
      margin-bottom: 20px;
    }
    .test-section {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 8px;
      border-left: 4px solid #2d5f3d;
    }
    .test-section h2 {
      font-size: 18px;
      margin-bottom: 15px;
      color: #333;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-weight: 500;
      margin-bottom: 5px;
      color: #333;
    }
    input, textarea, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-family: inherit;
      font-size: 14px;
    }
    textarea {
      min-height: 100px;
      resize: vertical;
    }
    button {
      background: #2d5f3d;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s;
    }
    button:hover {
      background: #1e4226;
    }
    button:disabled {
      background: #999;
      cursor: not-allowed;
    }
    .result {
      background: #f9f9f9;
      border: 1px solid #e0e0e0;
      padding: 15px;
      border-radius: 4px;
      margin-top: 15px;
      font-family: monospace;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .success {
      border-left-color: #27ae60;
      background: #d5f4e6;
    }
    .error {
      border-left-color: #e74c3c;
      background: #fadbd8;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 768px) {
      .row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 Teste de API - Livealoe Admin</h1>

    <div class="row">
      <!-- CREATE PRODUCT -->
      <div class="test-section">
        <h2>➕ Criar Produto</h2>
        <div class="form-group">
          <label>Nome</label>
          <input type="text" id="createName" placeholder="Ex: Meu Produto" value="Produto Teste">
        </div>
        <div class="form-group">
          <label>Categoria</label>
          <select id="createCategory">
            <option value="face">Face</option>
            <option value="body">Body</option>
            <option value="hair">Hair</option>
            <option value="supplements">Supplements</option>
            <option value="kits">Kits</option>
          </select>
        </div>
        <div class="form-group">
          <label>Preço</label>
          <input type="number" id="createPrice" placeholder="0.00" value="99.90" step="0.01">
        </div>
        <div class="form-group">
          <label>Ingredientes</label>
          <textarea id="createIngredients">Aloe Vera, Água filtrada</textarea>
        </div>
        <div class="form-group">
          <label>Descrição</label>
          <textarea id="createDescription">Descrição do produto teste</textarea>
        </div>
        <div class="form-group">
          <label>URL da Imagem (opcional)</label>
          <input type="text" id="createImageUrl" placeholder="https://..." value="">
        </div>
        <button onclick="createProduct()">Criar Produto</button>
        <div id="createResult"></div>
      </div>

      <!-- GET PRODUCTS -->
      <div class="test-section">
        <h2>📋 Listar Produtos</h2>
        <div class="form-group">
          <label>Filtro Categoria (opcional)</label>
          <select id="filterCategory">
            <option value="">Todas</option>
            <option value="face">Face</option>
            <option value="body">Body</option>
            <option value="hair">Hair</option>
          </select>
        </div>
        <div class="form-group">
          <label>Filtro Busca (opcional)</label>
          <input type="text" id="filterSearch" placeholder="Ex: aloe">
        </div>
        <button onclick="getProducts()">Listar Produtos</button>
        <div id="productsResult"></div>
      </div>

      <!-- UPDATE PRODUCT -->
      <div class="test-section">
        <h2>✏️ Atualizar Produto</h2>
        <div class="form-group">
          <label>ID do Produto</label>
          <input type="text" id="updateId" placeholder="Ex: prod_123456">
        </div>
        <div class="form-group">
          <label>Nome</label>
          <input type="text" id="updateName" placeholder="Novo nome">
        </div>
        <div class="form-group">
          <label>Preço</label>
          <input type="number" id="updatePrice" placeholder="0.00" step="0.01">
        </div>
        <div class="form-group">
          <label>Descrição</label>
          <textarea id="updateDescription">Nova descrição</textarea>
        </div>
        <button onclick="updateProduct()">Atualizar Produto</button>
        <div id="updateResult"></div>
      </div>

      <!-- DELETE PRODUCT -->
      <div class="test-section">
        <h2>🗑️ Deletar Produto</h2>
        <div class="form-group">
          <label>ID do Produto</label>
          <input type="text" id="deleteId" placeholder="Ex: prod_123456">
        </div>
        <button onclick="deleteProduct()" style="background: #e74c3c;">Deletar Produto</button>
        <div id="deleteResult"></div>
      </div>

      <!-- UPLOAD IMAGE -->
      <div class="test-section">
        <h2>📸 Upload de Imagem</h2>
        <div class="form-group">
          <label>Selecione uma imagem</label>
          <input type="file" id="imageFile" accept="image/*">
        </div>
        <button onclick="uploadImage()">Fazer Upload</button>
        <div id="uploadResult"></div>
      </div>

      <!-- API STATUS -->
      <div class="test-section">
        <h2>✅ Status da API</h2>
        <button onclick="checkHealth()">Verificar Status</button>
        <div id="healthResult"></div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:3001/api';

    function showResult(elementId, data, isError = false) {
      const el = document.getElementById(elementId);
      el.className = `result ${isError ? 'error' : 'success'}`;
      el.textContent = JSON.stringify(data, null, 2);
    }

    async function createProduct() {
      const data = {
        name: document.getElementById('createName').value,
        category: document.getElementById('createCategory').value,
        price: parseFloat(document.getElementById('createPrice').value),
        ingredients: document.getElementById('createIngredients').value,
        description: document.getElementById('createDescription').value,
        imageUrl: document.getElementById('createImageUrl').value,
        tags: ['teste']
      };

      try {
        const response = await fetch(`${API_URL}/products`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const result = await response.json();
        showResult('createResult', result, !response.ok);
      } catch (err) {
        showResult('createResult', { error: err.message }, true);
      }
    }

    async function getProducts() {
      const params = new URLSearchParams();
      const category = document.getElementById('filterCategory').value;
      const search = document.getElementById('filterSearch').value;
      
      if (category) params.append('category', category);
      if (search) params.append('search', search);

      try {
        const response = await fetch(`${API_URL}/products?${params}`);
        const result = await response.json();
        const summary = {
          total: result.total,
          count: result.products?.length,
          firstProduct: result.products?.[0]
        };
        showResult('productsResult', summary);
      } catch (err) {
        showResult('productsResult', { error: err.message }, true);
      }
    }

    async function updateProduct() {
      const id = document.getElementById('updateId').value;
      if (!id) {
        showResult('updateResult', { error: 'ID é obrigatório' }, true);
        return;
      }

      const data = {};
      const name = document.getElementById('updateName').value;
      if (name) data.name = name;
      
      const price = document.getElementById('updatePrice').value;
      if (price) data.price = parseFloat(price);
      
      const desc = document.getElementById('updateDescription').value;
      if (desc) data.description = desc;

      try {
        const response = await fetch(`${API_URL}/products/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const result = await response.json();
        showResult('updateResult', result, !response.ok);
      } catch (err) {
        showResult('updateResult', { error: err.message }, true);
      }
    }

    async function deleteProduct() {
      const id = document.getElementById('deleteId').value;
      if (!id) {
        showResult('deleteResult', { error: 'ID é obrigatório' }, true);
        return;
      }

      if (!confirm(`Tem certeza que quer deletar o produto ${id}?`)) return;

      try {
        const response = await fetch(`${API_URL}/products/${id}`, {
          method: 'DELETE'
        });
        const result = await response.json();
        showResult('deleteResult', result, !response.ok);
      } catch (err) {
        showResult('deleteResult', { error: err.message }, true);
      }
    }

    async function uploadImage() {
      const fileInput = document.getElementById('imageFile');
      if (!fileInput.files.length) {
        showResult('uploadResult', { error: 'Selecione um arquivo' }, true);
        return;
      }

      const formData = new FormData();
      formData.append('image', fileInput.files[0]);

      try {
        console.log('Uploading file:', fileInput.files[0].name);
        const response = await fetch(`${API_URL}/upload`, {
          method: 'POST',
          body: formData
          // NÃO definir Content-Type, o navegador fará automaticamente
        });
        
        const responseText = await response.text();
        console.log('Raw response:', responseText);
        
        let result;
        try {
          result = JSON.parse(responseText);
        } catch (e) {
          result = { error: `Invalid JSON response: ${responseText.substring(0, 100)}` };
        }
        
        showResult('uploadResult', result, !response.ok);
        if (response.ok && result.imageUrl) {
          fileInput.value = '';
        }
      } catch (err) {
        console.error('Upload error:', err);
        showResult('uploadResult', { error: err.message }, true);
      }
    }

    async function checkHealth() {
      try {
        const response = await fetch(`${API_URL}/health`);
        const result = await response.json();
        showResult('healthResult', result);
      } catch (err) {
        showResult('healthResult', { error: err.message }, true);
      }
    }
  </script>
</body>
</html>
